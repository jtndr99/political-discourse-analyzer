<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Discourse Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        h2 { margin-top: 0; text-align: center; font-weight: 500; letter-spacing: 0.5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
        input {
            width: 100%; padding: 12px; border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; box-sizing: border-box; font-family: 'Outfit', sans-serif;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #3b82f6; background: rgba(15, 23, 42, 0.8); }
        button {
            width: 100%; padding: 14px; border-radius: 8px; margin-top: 10px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none; color: white; font-weight: 500; cursor: pointer;
            font-family: 'Outfit', sans-serif; font-size: 16px; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .error { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Discourse Analyzer</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Access System</button>
        </form>
    </div>
</body>
</html>
